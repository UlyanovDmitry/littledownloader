default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DATABASE_USERNAME", 'littledownloader') %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", 'littledownloader') %>
  host: <%= ENV.fetch("DATABASE_HOST", 'localhost') %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>

development:
  <<: *default
  database: littledownloader_development

test:
  <<: *default
  database: littledownloader_test


production:
  primary: &primary_production
    <<: *default
    database: littledownloader_production
  cache:
    <<: *primary_production
    database: littledownloader_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: littledownloader_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: littledownloader_production_cable
    migrations_paths: db/cable_migrate
