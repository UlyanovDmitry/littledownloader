en:
  hello: "Hello world"
  telegram:
    handlers:
      text_handler:
        message: "Send a video link"
      errors:
        not_allowed: "⛔️ Access denied.\nYour Telegram ID: %{telegram_id}"
        unknown_command: "Unknown command"
      start_command:
        message: "Hi! Send me a link and I’ll try to process it."
      help_command:
        message: "🤖 LittleDownloader\n\nSend a video link and I’ll reply with a file.\n\nSupported:\n• YouTube\n• Shorts\n\nCommands:\n/start — start\n/help — help\n/my_info — profile info\n\nParams:\naudio-only — download audio only\n\nIf something doesn’t download, try a different link."
      info_command:
        message: "Your Telegram user_id: %{telegram_id}\nUsername: @%{username}\nDisk usage: %{disk_usage}"
      download:
        queued: "✅ Accepted. Download queued.\nID: %{id}"
        success: "✅ Download finished.\nID: %{id}\n%{filename}"
        admin_notification: "✅ Download finished.\nID: %{id}\n%{filename}\n\n%{username}"
        admin_failed_notification: "❌ Download failed.\nID: %{id}\n%{error}\n\n%{username}"
        failed: "❌ Download failed.\nID: %{id}\n%{error}"
        simple_failed: "❌ Download failed.\nID: %{id}"
        errors:
          limit_exceeded: "User storage limit reached (used: %{used}, limit: %{limit})"
          disk_space: "Disk free space below limit (free: %{free}, required: %{required})"
          no_url: "URL not found"
          telegram_error: "Telegram Error %{error}"
          file_too_big: "File too big. Allowed Size: %{limit_size} FileSize: %{file_size}"
