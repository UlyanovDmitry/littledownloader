name: CI

on:
  pull_request:
  push:
    branches: [ main ]

x-setup-ruby: &setup-ruby
  - name: Checkout code
    uses: actions/checkout@v6
  - name: Set up Ruby
    uses: ruby/setup-ruby@v1
    with:
      bundler-cache: true

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - <<: *setup-ruby
      - name: Scan for common Rails security vulnerabilities
        run: bin/brakeman --no-pager
      - name: Scan for known security vulnerabilities in gems
        run: bin/bundler-audit

  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - <<: *setup-ruby
      - name: Prepare RuboCop cache
        uses: actions/cache@v4
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-
      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432
    steps:
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libpq-dev
      - <<: *setup-ruby
      - name: Prepare database
        run: bin/rails db:test:prepare
      - name: Run RSpec tests
        run: bundle exec rspec --format RspecGithub::Formatter
